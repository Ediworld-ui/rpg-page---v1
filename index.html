<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Page</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-ico" href="images/favicon.ico">

    <style>
        /* Estilos do Site */
        body { 
            background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Estilos do Preloader */
        #preloader {
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 9999;
        }

        .preloader-hidden {
            opacity: 0;
            visibility: hidden;    
        }
    </style>
</head>

<body>

    <div id="preloader" class="bg-dark vh-100 vw-100 d-flex flex-column justify-content-center align-items-center position-fixed top-0 start-0">
        <img src="images/yibo.gif" alt="Loading..." class="mb-3" style="width: 100px; height: 100px;">
        <p class="text-white" style="font-size: 1;">...</p>
    </div>

     <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">Barra De Navegação</a>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>





            </form>
        </div>
     </nav>

     </nav>



    <div class="container mt-5">
        <h2 class="text-white">Bem vindo ao meu site</h2>
        <p class="text-white">Aqui você pode encontrar informações sobre RPGs, dicas de jogos, e muito mais.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



    <script>
        // Esta função avisa o navegador para agir quando tudo carregar
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            
            // Adiciona a classe CSS que faz o efeito de sumir
            preloader.classList.add('preloader-hidden');
            
            // Remove do display após a transição para não bloquear cliques
            setTimeout(() => {
                preloader.style.display = 'none';
            }, 500);
        });
    </script>
   
</body>
</html>
